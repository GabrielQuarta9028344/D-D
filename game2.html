<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dead by Daylight Snake</title>
<style>
    body {
        background: #000;
        color: #eee;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        color: #c00;
        text-shadow: 0 0 10px red;
    }

    canvas {
        background: #111;
        border: 3px solid #c00;
        margin-top: 20px;
        box-shadow: 0 0 20px red;
    }

    #riddleBox {
        background: #222;
        padding: 20px;
        width: 320px;
        margin: 20px auto;
        border: 2px solid #c00;
        box-shadow: 0 0 10px red;
    }

    .hidden {
        display: none;
    }

    input {
        width: 90%;
        padding: 8px;
        margin-top: 10px;
        background: #000;
        border: 1px solid #555;
        color: #eee;
    }

    button {
        margin-top: 10px;
        padding: 8px 16px;
        background: #c00;
        border: none;
        cursor: pointer;
        color: white;
    }

    button:hover {
        background: #f33;
    }

    #terrorRadius {
        width: 400px;
        height: 20px;
        margin: 10px auto;
        background: linear-gradient(to right, transparent, red, transparent);
        opacity: 0;
        transition: opacity 0.3s;
    }
</style>
</head>
<body>

<h1>Dead by Daylight: Escape the Killer</h1>
<p>Besturing: pijltjestoetsen — Restart: R</p>

<div id="terrorRadius"></div>

<canvas id="game" width="400" height="400"></canvas>

<p>Score: <span id="score">0</span></p>
<p id="status"></p>

<div id="riddleBox" class="hidden">
    <h2>Totem Ontdekt</h2>
    <p id="riddleText"></p>
    <input id="answerInput" placeholder="Jouw antwoord...">
    <button id="answerButton">Beantwoord</button>
    <p id="hintText"></p>
</div>

<script>
/* ------------------------------
   DBD-THEMA RAADSELS
--------------------------------*/
const riddles = [
    {
        riddle: 'Ik ben een deur die alleen opengaat als je het juiste patroon kent. Eén fout en de Killer hoort je. Wat ben ik?',
        answer: 'codepaneel',
        hint: 'Je drukt op mij met je vingers'
    },
    {
        riddle: 'Ik ben een vloeistof die van kleur verandert als er gevaar is. Wat ben ik?',
        answer: 'chemische indicator',
        hint: 'Je vindt me in reageerbuisjes'
    },
    {
        riddle: 'Ik bewaak het geheim van de Killer. Ik ben geen mens, maar ik heb wel een mond die nooit praat. Wat ben ik?',
        answer: 'kluis',
        hint: 'Je opent me met een sleutel of code'
    }
];

/* ------------------------------
   GAME VARIABELEN
--------------------------------*/
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const box = 20;

let snake, dx, dy, food, totem, score, gameOver;
let riddleActive = false;
let currentRiddle = null;

/* ------------------------------
   KILLER (MONSTER)
--------------------------------*/
let killer;
let killerSpeed = 12;
let killerTick = 0;

/* ------------------------------
   START GAME
--------------------------------*/
restartGame();

function restartGame() {
    snake = [{x: 10 * box, y: 10 * box}];
    dx = box;
    dy = 0;
    food = randomPosition();
    totem = randomPosition();
    score = 0;
    gameOver = false;
    riddleActive = false;
    killer = {x: 0, y: 0};
    killerSpeed = 12;
    document.getElementById("score").innerText = score;
    document.getElementById("status").innerText = "";
    document.getElementById("riddleBox").classList.add("hidden");
}

/* ------------------------------
   RANDOM POSITIE
--------------------------------*/
function randomPosition() {
    return {
        x: Math.floor(Math.random() * (canvas.width / box)) * box,
        y: Math.floor(Math.random() * (canvas.height / box)) * box
    };
}

/* ------------------------------
   BESTURING
--------------------------------*/
document.addEventListener("keydown", function(e) {
    if (riddleActive) return;

    if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -box; }
    else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = box; }
    else if (e.key === "ArrowLeft" && dx === 0) { dx = -box; dy = 0; }
    else if (e.key === "ArrowRight" && dx === 0) { dx = box; dy = 0; }

    if (gameOver && e.key.toLowerCase() === "r") restartGame();
});

/* ------------------------------
   GAME LOOP
--------------------------------*/
setInterval(gameLoop, 120);

function gameLoop() {
    if (gameOver || riddleActive) return;

    moveSnake();
    moveKiller();
    checkCollision();
    draw();
}

/* ------------------------------
   SNAKE BEWEGING
--------------------------------*/
function moveSnake() {
    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("score").innerText = score;
        food = randomPosition();
    }
    else if (head.x === totem.x && head.y === totem.y) {
        totem = randomPosition();
        triggerRiddle();
    }
    else {
        snake.pop();
    }
}

/* ------------------------------
   KILLER BEWEEGT NAAR JE TOE
--------------------------------*/
function moveKiller() {
    killerTick++;
    if (killerTick < killerSpeed) return;
    killerTick = 0;

    if (killer.x < snake[0].x) killer.x += box;
    else if (killer.x > snake[0].x) killer.x -= box;

    if (killer.y < snake[0].y) killer.y += box;
    else if (killer.y > snake[0].y) killer.y -= box;

    updateTerrorRadius();
}

/* ------------------------------
   TERROR RADIUS EFFECT
--------------------------------*/
function updateTerrorRadius() {
    const dist = Math.abs(killer.x - snake[0].x) + Math.abs(killer.y - snake[0].y);
    const bar = document.getElementById("terrorRadius");

    if (dist < 80) bar.style.opacity = 1;
    else if (dist < 160) bar.style.opacity = 0.5;
    else bar.style.opacity = 0;
}

/* ------------------------------
   BOTSINGEN
--------------------------------*/
function checkCollision() {
    const head = snake[0];

    if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height)
        return endGame("Je rende tegen een muur");

    for (let i = 1; i < snake.length; i++)
        if (head.x === snake[i].x && head.y === snake[i].y)
            return endGame("Je struikelde over jezelf");

    if (head.x === killer.x && head.y === killer.y)
        return endGame("De Killer heeft je gevonden");
}

function endGame(msg) {
    gameOver = true;
    document.getElementById("status").innerText = msg + " — Druk op R om opnieuw te starten.";
}

/* ------------------------------
   TEKENEN
--------------------------------*/
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "lime";
    snake.forEach(p => ctx.fillRect(p.x, p.y, box, box));

    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    ctx.fillStyle = "yellow";
    ctx.fillRect(totem.x, totem.y, box, box);

    ctx.fillStyle = "purple";
    ctx.fillRect(killer.x, killer.y, box, box);
}

/* ------------------------------
   RAADSELS / TOTEMS
--------------------------------*/
function triggerRiddle() {
    riddleActive = true;
    currentRiddle = riddles[Math.floor(Math.random() * riddles.length)];

    document.getElementById("riddleText").innerText = currentRiddle.riddle;
    document.getElementById("hintText").innerText = "";
    document.getElementById("answerInput").value = "";
    document.getElementById("riddleBox").classList.remove("hidden");
    document.getElementById("status").innerText = "Totem geactiveerd!";
}

document.getElementById("answerButton").addEventListener("click", checkAnswer);

function checkAnswer() {
    const input = document.getElementById("answerInput").value.trim().toLowerCase();
    if (input === currentRiddle.answer.toLowerCase()) {
        riddleActive = false;
        document.getElementById("riddleBox").classList.add("hidden");
        document.getElementById("status").innerText = "Je hebt de Totem gezuiverd!";
    } else {
        document.getElementById("hintText").innerText = "Hint: " + currentRiddle.hint;
        killerSpeed = Math.max(3, killerSpeed - 1); // Killer wordt sneller
    }
}
</script>

</body>
</html>
